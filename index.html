<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>HACKEN STORE - SMART MONEY XAUUSD</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body {
    background:#000;
    color:#ffd700;
    font-family:Arial;
    text-align:center;
}

h1 { text-shadow:0 0 10px gold; }

.chart {
    width:95%;
    height:400px;
    margin:auto;
}

.box {
    display:inline-block;
    padding:10px;
    margin:5px;
    border:1px solid gold;
    border-radius:10px;
    box-shadow:0 0 10px gold;
}

.buy { color:#00ff00; }
.sell { color:red; }
</style>
</head>

<body>

<h1>🟡 SMART MONEY XAUUSD</h1>

<div id="signal"></div>
<div id="chart" class="chart"></div>

<footer>HACKEN STORE ⚡</footer>

<script>

const API_KEY = "a4186ccd7b4843cc9fa11f095aecf159";

// CHART
const chart = LightweightCharts.createChart(document.getElementById('chart'), { height:400 });

const candleSeries = chart.addCandlestickSeries();
const lineSeries = chart.addLineSeries({ color: 'yellow' });

// FETCH
async function getData(){
    let res = await fetch(`https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=1min&outputsize=200&apikey=${API_KEY}`);
    let d = await res.json();

    return d.values.reverse().map(c=>({
        time:new Date(c.datetime).getTime()/1000,
        open:+c.open,
        high:+c.high,
        low:+c.low,
        close:+c.close
    }));
}

// SMART MONEY DETECTION

function detectBOS(data){
    let lastHigh = Math.max(...data.slice(-20).map(c=>c.high));
    let lastLow = Math.min(...data.slice(-20).map(c=>c.low));

    let last = data[data.length-1];

    if(last.close > lastHigh) return "BOS HAUSSIER 🚀";
    if(last.close < lastLow) return "BOS BAISSIER 🔻";
    return "STRUCTURE STABLE";
}

function detectLiquiditySweep(data){
    let highs = data.slice(-10).map(c=>c.high);
    let lows = data.slice(-10).map(c=>c.low);

    let last = data[data.length-1];

    if(last.high > Math.max(...highs.slice(0,-1)))
        return "LIQUIDITÉ HAUT PRISE ⚠️";

    if(last.low < Math.min(...lows.slice(0,-1)))
        return "LIQUIDITÉ BAS PRISE ⚠️";

    return "PAS DE SWEEP";
}

function detectOrderBlock(data){
    let last = data[data.length-2];

    if(last.close < last.open)
        return "ORDER BLOCK ACHAT 🟢";

    if(last.close > last.open)
        return "ORDER BLOCK VENTE 🔴";

    return "NEUTRE";
}

function detectFVG(data){
    let a = data[data.length-3];
    let b = data[data.length-2];
    let c = data[data.length-1];

    if(c.low > a.high) return "FVG HAUSSIER 📈";
    if(c.high < a.low) return "FVG BAISSIER 📉";

    return "PAS DE FVG";
}

// UPDATE
async function update(){
    let candles = await getData();

    candleSeries.setData(candles);

    let bos = detectBOS(candles);
    let sweep = detectLiquiditySweep(candles);
    let ob = detectOrderBlock(candles);
    let fvg = detectFVG(candles);

    // SIGNAL FINAL
    let signal="NEUTRE";
    let cls="";

    if(bos.includes("HAUSSIER") && ob.includes("ACHAT")) {
        signal="SMART BUY 🚀";
        cls="buy";
    }
    else if(bos.includes("BAISSIER") && ob.includes("VENTE")) {
        signal="SMART SELL 🔻";
        cls="sell";
    }

    document.getElementById("signal").innerHTML=`
        <div class="${cls}">
            <h2>${signal}</h2>
            <div class="box">${bos}</div>
            <div class="box">${sweep}</div>
            <div class="box">${ob}</div>
            <div class="box">${fvg}</div>
        </div>
    `;
}

setInterval(update,5000);
update();

</script>

</body>
</html>

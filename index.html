<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>HACKEN STORE - ULTRA PRO</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body {
    margin:0;
    background:#000;
    color:#00ffc3;
    font-family:Arial;
    text-align:center;
}

h1 {
    text-shadow:0 0 10px #00ffc3;
}

.chart {
    width:95%;
    height:300px;
    margin:auto;
    margin-top:15px;
}

.box {
    display:inline-block;
    padding:10px;
    margin:5px;
    border:1px solid #00ffc3;
    border-radius:10px;
    box-shadow:0 0 10px #00ffc3;
}

.buy { color:#00ff00; }
.sell { color:red; }
.neutral { color:orange; }

footer { opacity:0.4; margin-top:10px; }
</style>
</head>

<body>

<h1>⚡ HACKEN STORE - ULTRA PRO</h1>

<div id="indicators"></div>
<h2 id="signal">Connexion...</h2>

<div id="mainChart" class="chart"></div>
<div id="rsiChart" class="chart"></div>
<div id="macdChart" class="chart"></div>

<footer>HACKEN STORE 🚀</footer>

<script>

// CREATE CHARTS
const mainChart = LightweightCharts.createChart(document.getElementById('mainChart'), { height:300 });
const rsiChart = LightweightCharts.createChart(document.getElementById('rsiChart'), { height:200 });
const macdChart = LightweightCharts.createChart(document.getElementById('macdChart'), { height:200 });

// SERIES
const candleSeries = mainChart.addCandlestickSeries();
const ma20Series = mainChart.addLineSeries({ color: 'yellow' });
const ma50Series = mainChart.addLineSeries({ color: 'blue' });
const ma200Series = mainChart.addLineSeries({ color: 'white' });

const bbUpper = mainChart.addLineSeries({ color: 'red' });
const bbLower = mainChart.addLineSeries({ color: 'green' });

const rsiSeries = rsiChart.addLineSeries({ color: 'orange' });
const macdSeries = macdChart.addLineSeries({ color: 'cyan' });

// FETCH
async function getData(){
    let res = await fetch("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=200");
    let d = await res.json();

    return d.map(c=>({
        time: c[0]/1000,
        open: +c[1],
        high: +c[2],
        low: +c[3],
        close: +c[4]
    }));
}

// INDICATORS
function MA(data, p){
    let r=[];
    for(let i=0;i<data.length;i++){
        if(i<p) r.push(null);
        else{
            let s=0;
            for(let j=i-p;j<i;j++) s+=data[j];
            r.push(s/p);
        }
    }
    return r;
}

function RSI(data,p=14){
    let r=[];
    for(let i=0;i<data.length;i++){
        if(i<p) r.push(null);
        else{
            let g=0,l=0;
            for(let j=i-p;j<i;j++){
                let d=data[j+1]-data[j];
                if(d>0) g+=d; else l-=d;
            }
            let rs=g/(l||1);
            r.push(100-(100/(1+rs)));
        }
    }
    return r;
}

function MACD(data){
    const EMA=(d,p)=>{
        let k=2/(p+1), ema=[d[0]];
        for(let i=1;i<d.length;i++)
            ema.push(d[i]*k+ema[i-1]*(1-k));
        return ema;
    };
    let e12=EMA(data,12), e26=EMA(data,26);
    return e12.map((v,i)=>v-e26[i]);
}

function Bollinger(data,p=20){
    let ma=MA(data,p), up=[], low=[];
    for(let i=0;i<data.length;i++){
        if(i<p){ up.push(null); low.push(null); }
        else{
            let m=ma[i], s=0;
            for(let j=i-p;j<i;j++)
                s+=(data[j]-m)**2;
            let sd=Math.sqrt(s/p);
            up.push(m+2*sd);
            low.push(m-2*sd);
        }
    }
    return {up,low};
}

// UPDATE
async function update(){
    let candles = await getData();
    let closes = candles.map(c=>c.close);

    candleSeries.setData(candles);

    let ma20 = MA(closes,20);
    let ma50 = MA(closes,50);
    let ma200 = MA(closes,200);

    let bb = Bollinger(closes);
    let rsi = RSI(closes);
    let macd = MACD(closes);

    ma20Series.setData(candles.map((c,i)=>({time:c.time,value:ma20[i]})));
    ma50Series.setData(candles.map((c,i)=>({time:c.time,value:ma50[i]})));
    ma200Series.setData(candles.map((c,i)=>({time:c.time,value:ma200[i]})));

    bbUpper.setData(candles.map((c,i)=>({time:c.time,value:bb.up[i]})));
    bbLower.setData(candles.map((c,i)=>({time:c.time,value:bb.low[i]})));

    rsiSeries.setData(candles.map((c,i)=>({time:c.time,value:rsi[i]})));
    macdSeries.setData(candles.map((c,i)=>({time:c.time,value:macd[i]})));

    let last = closes.at(-1);
    let signal="NEUTRE", cls="neutral";

    if(rsi.at(-1)<30 && last<ma20.at(-1)) { signal="ACHAT 🚀"; cls="buy"; }
    else if(rsi.at(-1)>70 && last>ma20.at(-1)) { signal="VENTE 🔻"; cls="sell"; }

    document.getElementById("signal").innerHTML=`<span class="${cls}">${signal}</span>`;

    document.getElementById("indicators").innerHTML=`
        <div class="box">RSI: ${rsi.at(-1)?.toFixed(2)}</div>
        <div class="box">Prix: ${last.toFixed(2)}</div>
    `;
}

setInterval(update,3000);
update();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot EUR/USD OTC - Hacken</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f0f0f; color: #fff; text-align: center; padding: 20px; margin: 0; }
        h2 { color: #ffd700; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { font-size: 0.85rem; color: #aaa; margin-bottom: 20px; }
        
        .card { background: #1e1e1e; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); max-width: 400px; margin: 0 auto; border: 1px solid #333; }
        
        #price-display { font-size: 1.4rem; font-weight: bold; margin: 10px 0; color: #4fc3f7; font-family: monospace; }
        
        #signal-box {
            margin: 20px 0;
            padding: 20px;
            border-radius: 12px;
            font-size: 1.6rem;
            font-weight: 900;
            text-transform: uppercase;
            transition: all 0.3s;
            border: 2px solid transparent;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .buy { background-color: rgba(0, 200, 83, 0.25); color: #00e676; border-color: #00e676; box-shadow: 0 0 20px rgba(0, 230, 118, 0.3); animation: pulseGreen 2s infinite; }
        .sell { background-color: rgba(255, 61, 0, 0.25); color: #ff5252; border-color: #ff5252; box-shadow: 0 0 20px rgba(255, 82, 82, 0.3); animation: pulseRed 2s infinite; }
        .wait { background-color: #2a2a2a; color: #666; border-color: #444; }
        
        @keyframes pulseGreen { 0% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(0, 230, 118, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0); } }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 82, 82, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0); } }

        button {
            background: linear-gradient(90deg, #2962ff, #00b0ff);
            color: white; border: none; padding: 16px; width: 100%;
            font-size: 1.1rem; font-weight: bold; border-radius: 8px;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(41, 98, 255, 0.3);
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.96); }
        button:disabled { background: #333; color: #555; cursor: not-allowed; box-shadow: none; }

        .timer { margin-top: 15px; font-size: 0.85rem; color: #888; min-height: 20px; }
        
        .note { font-size: 0.7rem; color: #555; margin-top: 20px; line-height: 1.4; border-top: 1px solid #333; padding-top: 10px; }
        
        /* Signature Creator */
        .creator-signature {
            margin-top: 25px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
            border-top: 1px dashed #444;
            padding-top: 15px;
        }
        .creator-signature span { color: #fff; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🤖 Bot EUR/USD OTC</h2>
        <div class="subtitle">Mode: Agressif (Signaux Fréquents) • Exp 30m</div>
        
        <div>Prix Actuel: <span id="price-display">...</span></div>
        
        <div id="signal-box" class="wait">EN ATTENTE</div>
        
        <button id="btn-analyze" onclick="lancerAnalyse()">LANCER L'ANALYSE</button>
        
        <div class="timer" id="timer-msg"></div>

        <div class="note">
            ⚠️ <strong>Mode Relâché :</strong> Plus de signaux, risque accru.<br>
            Vérifiez toujours le graphique avant de valider.<br>
            Expiration recommandée : <strong>30 Minutes</strong>.
        </div>

        <!-- SIGNATURE DEMANDÉE -->
        <div class="creator-signature">
            Creator <span>Hacken STORE</span>
        </div>
    </div>

    <script>
        // API Binance pour EUR/USDT (Proxy de tendance pour EUR/USD)
        const API_URL = 'https://api.binance.com/api/v3/klines?symbol=EURUSDT&interval=15m&limit=50';

        async function getMarketData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Erreur Réseau");
                const data = await response.json();
                const closes = data.map(k => parseFloat(k[4]));
                const currentPrice = closes[closes.length - 1];
                return { closes, currentPrice };
            } catch (error) {
                console.error(error);
                return null;
            }
        }

        // Calcul RSI
        function calculateRSI(prices, period = 14) {
            if (prices.length < period + 1) return 50;
            let gains = 0, losses = 0;
            for (let i = prices.length - period - 1; i < prices.length - 1; i++) {
                const diff = prices[i+1] - prices[i];
                if (diff >= 0) gains += diff;
                else losses -= diff;
            }
            let avgGain = gains / period;
            let avgLoss = losses / period;
            const rs = avgGain / (avgLoss === 0 ? 1 : avgLoss);
            return 100 - (100 / (1 + rs));
        }

        // Calcul EMA
        function calculateEMA(prices, period) {
            const k = 2 / (period + 1);
            let ema = prices[0];
            for (let i = 1; i < prices.length; i++) {
                ema = prices[i] * k + ema * (1 - k);
            }
            return ema;
        }

        async function lancerAnalyse() {
            const btn = document.getElementById('btn-analyze');
            const signalBox = document.getElementById('signal-box');
            const priceDisplay = document.getElementById('price-display');
            const timerMsg = document.getElementById('timer-msg');

            btn.disabled = true;
            btn.innerText = "ANALYSE EN COURS...";
            signalBox.className = "wait";
            signalBox.innerText = "CALCUL...";
            timerMsg.innerText = "";

            await new Promise(r => setTimeout(r, 600)); // Petit délai simulé

            const data = await getMarketData();
            
            if (!data) {
                signalBox.innerText = "ERREUR CONNEXION";
                btn.disabled = false;
                btn.innerText = "RÉESSAYER";
                return;
            }

            priceDisplay.innerText = data.currentPrice.toFixed(5);

            // --- STRATÉGIE MOINS STRICTE ---
            // On utilise des périodes plus courtes pour réagir plus vite
            const emaFast = calculateEMA(data.closes, 7);  // Plus réactif (avant 9)
            const emaSlow = calculateEMA(data.closes, 20); // Plus réactif (avant 21)
            const rsi = calculateRSI(data.closes, 14);
            
            const lastClose = data.closes[data.closes.length - 1];

            let signal = "ATTENDRE ⚪";
            let type = "wait";
            let reason = "";

            // LOGIQUE ASSOUPLIE :
            // 1. ACHAT : Soit la tendance est haussière (Fast > Slow), SOIT le RSI est très bas (<35) même si tendance neutre
            if (lastClose > emaFast && emaFast > emaSlow) {
                // Tendance haussière claire + RSI pas trop haut
                if (rsi < 75) { 
                    signal = "ACHETER (CALL) 🟢";
                    type = "buy";
                    reason = "Tendance Haussière Confirmée";
                }
            } else if (rsi < 35) {
                // Rebond pur sur survente (même sans tendance forte)
                signal = "ACHETER (CALL) 🟢";
                type = "buy";
                reason = "Rebond Survente (RSI Bas)";
            }

            // 2. VENTE : Soit la tendance est baissière, SOIT le RSI est très haut (>65)
            if (signal === "ATTENDRE ⚪") { // Seulement si pas déjà d'achat
                if (lastClose < emaFast && emaFast < emaSlow) {
                    if (rsi > 25) {
                        signal = "VENDRE (PUT) 🔴";
                        type = "sell";
                        reason = "Tendance Baissière Confirmée";
                    }
                } else if (rsi > 65) {
                    // Rebond pur sur surachat
                    signal = "VENDRE (PUT) 🔴";
                    type = "sell";
                    reason = "Rebond Surachat (RSI Haut)";
                }
            }

            signalBox.innerText = signal;
            signalBox.className = type;
            
            if (type !== "wait") {
                timerMsg.innerText = `✅ Signal Valide ! Raison: ${reason}`;
                timerMsg.style.color = type === 'buy' ? '#00e676' : (type === 'sell' ? '#ff5252' : '#888');
            } else {
                timerMsg.innerText = "❌ Marché indécis ou conditions non réunies.";
                timerMsg.style.color = "#666";
            }

            btn.disabled = false;
            btn.innerText = "ANALYSER À NOUVEAU";
        }
    </script>
</body>
</html>
